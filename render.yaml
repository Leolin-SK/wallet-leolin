services:
  - type: web
    name: wallet-leolin-backend
    runtime: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: python manage.py migrate && gunicorn config.wsgi:application --bind 0.0.0.0:$PORT
    envVars:
      - key: SECRET_KEY
        value: leolin-wallet-super-secret-key-2026-cameroun-lille
      - key: DEBUG
        value: "False"
      - key: ALLOWED_HOSTS
        value: .onrender.com,localhost
      - key: DJANGO_SETTINGS_MODULE
        value: config.settings
      - key: CORS_ALLOWED_ORIGINS
        value: https://wallet-leolin-jvzw.vercel.app
    plan: free

databases:
  - name: wallet-leolin-db
    databaseName: wallet_leolin
    plan: free